name: Update v2rayN Subscription

# Triggers:
#   1. Schedule: every 6 hours (UTC 00:00, 06:00, 12:00, 18:00)
#   2. Manual: workflow_dispatch
#   3. On push to scripts/ or workflow file (for testing changes)
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

# Allow the workflow to push back to the repo
permissions:
  contents: write

concurrency:
  group: update-subscription
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate subscription files
        run: python scripts/generate_subscription.py

      - name: Fetch browser tool download packages
        run: python scripts/fetch_browser_tools.py

      - name: Show generated files
        run: |
          echo "=== Files in subscribe/ ==="
          ls -lh subscribe/
          echo ""
          echo "=== meta.json ==="
          cat subscribe/meta.json
          echo ""
          echo "=== browser-tools.json (summary) ==="
          python3 -c "
          import json
          d = json.load(open('subscribe/browser-tools.json'))
          print(f'Generated at: {d[\"generated_at\"]}')
          total_pkgs = sum(len(s.get('packages', [])) for s in d['sources'])
          total_std = sum(len(s.get('standalone_downloads', [])) for s in d['sources'])
          print(f'Total packages       : {total_pkgs}')
          print(f'Total standalone DLs : {total_std}')
          for s in d['sources']:
              pkgs = s.get('packages', [])
              if pkgs:
                  print(f'  {s[\"source\"]:25s}: {len(pkgs)} packages')
          "
          echo ""
          echo "=== First 5 URIs ==="
          head -5 subscribe/v2rayn.txt

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subscribe/
          if git diff --cached --quiet; then
            echo "No changes since last run - skipping commit."
          else
            git commit -m "🔄 Update v2rayN subscription ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Pushed successfully."
          fi

      - name: Fail-safe summary
        if: always()
        run: |
          echo "## Subscription Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f subscribe/meta.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat subscribe/meta.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No meta.json produced - generation failed." >> $GITHUB_STEP_SUMMARY
          fi
